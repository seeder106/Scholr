<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Scholr — the academic community platform for students to ask, answer, and grow together." />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Scholr — Study smarter with your whole campus" />
    <meta property="og:description" content="Join communities for your courses, ask questions, get answers, and earn reputation helping others." />
    <meta property="og:image"       content="/og-image.svg" />
    <meta property="og:url"         content="https://scholr.app" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Scholr — Study smarter with your whole campus" />
    <meta name="twitter:description" content="The academic community platform built for students." />
    <meta name="twitter:image"       content="/og-image.svg" />

    <!-- Theme colour (browser chrome on mobile) -->
    <meta name="theme-color" content="#1F3A8A" />

    <title>Scholr</title>
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
