<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1F3A8A"/>

  <!-- Subtle dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.5" fill="white" fill-opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Gradient accent blobs -->
  <circle cx="1050" cy="120" r="220" fill="#10B981" fill-opacity="0.12"/>
  <circle cx="150"  cy="520" r="180" fill="#FBBF24" fill-opacity="0.10"/>

  <!-- Logo background pill -->
  <rect x="68" y="68" width="80" height="80" rx="20" fill="white" fill-opacity="0.15"/>

  <!-- Book icon in logo pill -->
  <g transform="translate(84, 84)">
    <!-- Left page -->
    <path d="M4 6C4 5.44772 4.44772 5 5 5H22C23.1046 5 24 5.89543 24 7V41C24 41 18 40 13 41C10.5 41.5 8 42.5 8 42.5C6.89543 42.5 6 41.6046 6 40.5V6Z" fill="white" fill-opacity="0.95"/>
    <!-- Right page -->
    <path d="M44 6C44 5.44772 43.5523 5 43 5H26C24.8954 5 24 5.89543 24 7V41C24 41 30 40 35 41C37.5 41.5 40 42.5 40 42.5C41.1046 42.5 42 41.6046 42 40.5V6Z" fill="white" fill-opacity="0.70"/>
    <!-- Spine -->
    <line x1="24" y1="7" x2="24" y2="41" stroke="#1F3A8A" stroke-width="1.5"/>
    <!-- Left lines -->
    <line x1="9" y1="14" x2="21" y2="14" stroke="#1F3A8A" stroke-width="1.5" stroke-opacity="0.25" stroke-linecap="round"/>
    <line x1="9" y1="20" x2="21" y2="20" stroke="#1F3A8A" stroke-width="1.5" stroke-opacity="0.25" stroke-linecap="round"/>
    <line x1="9" y1="26" x2="18" y2="26" stroke="#1F3A8A" stroke-width="1.5" stroke-opacity="0.25" stroke-linecap="round"/>
    <!-- Right lines -->
    <line x1="27" y1="14" x2="39" y2="14" stroke="#1F3A8A" stroke-width="1.5" stroke-opacity="0.18" stroke-linecap="round"/>
    <line x1="27" y1="20" x2="39" y2="20" stroke="#1F3A8A" stroke-width="1.5" stroke-opacity="0.18" stroke-linecap="round"/>
    <line x1="27" y1="26" x2="36" y2="26" stroke="#1F3A8A" stroke-width="1.5" stroke-opacity="0.18" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="172" y="128" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="white" letter-spacing="-1">Scholr</text>

  <!-- Tagline -->
  <text x="68" y="196" font-family="Georgia, serif" font-size="32" fill="white" fill-opacity="0.70">Study smarter with your whole campus</text>

  <!-- Divider line -->
  <line x1="68" y1="240" x2="600" y2="240" stroke="white" stroke-opacity="0.20" stroke-width="1.5"/>

  <!-- Feature pills -->
  <g transform="translate(68, 268)">
    <!-- Pill 1 -->
    <rect width="196" height="44" rx="22" fill="white" fill-opacity="0.12"/>
    <text x="98" y="28" font-family="Georgia, serif" font-size="20" fill="white" text-anchor="middle" fill-opacity="0.9">💬 Threaded Q&amp;A</text>
    <!-- Pill 2 -->
    <rect x="212" width="180" height="44" rx="22" fill="white" fill-opacity="0.12"/>
    <text x="302" y="28" font-family="Georgia, serif" font-size="20" fill="white" text-anchor="middle" fill-opacity="0.9">⭐ Reputation</text>
    <!-- Pill 3 -->
    <rect x="408" width="200" height="44" rx="22" fill="white" fill-opacity="0.12"/>
    <text x="508" y="28" font-family="Georgia, serif" font-size="20" fill="white" text-anchor="middle" fill-opacity="0.9">🏘️ Communities</text>
  </g>

  <!-- CTA badge bottom-right -->
  <rect x="900" y="490" width="232" height="56" rx="28" fill="#FBBF24"/>
  <text x="1016" y="525" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#1F3A8A" text-anchor="middle">Free to join →</text>

  <!-- Domain watermark -->
  <text x="68" y="590" font-family="Georgia, serif" font-size="22" fill="white" fill-opacity="0.40">scholr.app</text>
</svg>
